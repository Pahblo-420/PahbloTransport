<div id="quoteModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="document.getElementById('quoteModal').style.display='none'">&times;</span>
    <h2>Get a Quote</h2>
    <p>Fill in the details below and we'll email you a quote.</p>
    
    <form id="quoteForm" action="https://formspree.io/f/mgoplkzg" method="POST">
      
      <input type="hidden" name="_subject" value="New Quote Request - Pahblo Scholar Transport">
      
      <div class="form-group">
        <input type="text" name="parentName" placeholder="Full Name" required>
      </div>
      <div class="form-group">
        <input type="email" name="email" placeholder="Email Address" required>
      </div>
      <div class="form-group">
        <input type="tel" name="phone" placeholder="Phone Number" required>
      </div>

      <div class="form-row">
        <input type="number" id="grade" name="grade" placeholder="Learner Grade" min="0" max="12" required>
        <select id="frequency" name="frequency" required>
          <option value="" disabled selected>Frequency</option>
          <option value="daily">Daily (Both Ways)</option>
          <option value="morning">Morning Only</option>
          <option value="afternoon">Afternoon Only</option>
        </select>
      </div>
      
      <div class="form-group">
        <input type="text" name="pickup_area" placeholder="Pickup Suburb/Area" required>
      </div>
      
      <div class="form-group">
        <input type="text" name="school_name" placeholder="School Name" required>
      </div>

      <button type="submit" class="submit-btn">Send My Quote</button>
      
      <p id="quoteResult"></p>
    </form>
  </div>
</div>
